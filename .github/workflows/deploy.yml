name: Deploy to crm.moathhamad.space

# Automatic deploy on every push to main (staging/production environment).
# Configure these repository secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST        e.g. 203.0.113.10  (server IP or hostname)
#   SSH_USER        e.g. deploy         (SSH user with access to the app dir)
#   SSH_PORT        e.g. 22             (optional, defaults to 22)
#   SSH_PRIVATE_KEY the private key (PEM) whose public key is in the server's authorized_keys
#   APP_DIR         e.g. /var/www/crm-system

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}
            bash deploy/deploy.sh
