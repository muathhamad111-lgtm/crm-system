# Nginx server block for crm.moathhamad.space
# Place in /etc/nginx/sites-available/crm.moathhamad.space and symlink to sites-enabled.
# Adjust the PHP-FPM socket version if needed. Obtain TLS with:
#   sudo certbot --nginx -d crm.moathhamad.space

server {
    listen 80;
    listen [::]:80;
    server_name crm.moathhamad.space;

    # Redirect all HTTP to HTTPS (certbot manages the 443 block below).
    root /var/www/crm-system/public;
    index index.php;

    location /.well-known/acme-challenge/ { allow all; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.moathhamad.space;

    root /var/www/crm-system/public;
    index index.php;
    charset utf-8;

    # ssl_certificate / ssl_certificate_key are injected by certbot.

    client_max_body_size 25M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
